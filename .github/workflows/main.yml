name: Verify Human Identity

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Debug
        run: |
          node -v
          npm -v
          ls -R

      - name: Install dependencies
        run: npm install

      - name: Install ClawHub
        run: npx clawhub@latest install verified-agent-identity

      - name: Create Identity
        run: node scripts/createNewEthereumIdentity.js

      - name: Link Human
        run: >
          node scripts/manualLinkHumanToAgent.js
          --challenge "{\"name\":\"mominky\",\"description\":\"mominky AI Agent\"}"
